name: software-dev-workflow
version: 1.0.0
description: >
  Production-grade software development workflow that orchestrates a 6-phase
  lifecycle (Define → Plan → Build → Verify → Review → Ship) for any tech stack.
  Combines 24 engineering skills from agent-skills with Syncfusion UI Builders
  for React, Angular, Blazor, .NET MAUI, WPF, WinForms, and WinUI.
  Use when starting a new project, building features, fixing bugs, or shipping
  to production. Enforces spec-driven development, test-driven development,
  code review, security hardening, and incremental delivery.
author: Syncfusion Inc
targets:
  - copilot
  - claude
  - cursor
  - codex
  - gemini
  - windsurf
  - kiro
  - opencode
dependencies:
  apm:
    # Engineering discipline — 24 production-grade skills
    - addyosmani/agent-skills
    # OpenSpec — spec-driven planning layer for Define + Plan phases
    # Install separately via: npm install -g @fission-ai/openspec@latest
    # Then run: openspec init (in your project root)
    # See https://openspec.dev/ for docs
    #
    # Syncfusion UI Builders — install ONE per project (not bundled to avoid ~500 skill context bloat)
    # The workflow auto-detects your stack and prompts you to install the right builder.
    # See README.md for per-framework install commands:
    #   apm install syncfusion/react-ui-builder -t <target>
    #   apm install syncfusion/angular-ui-builder -t <target>
    #   apm install syncfusion/blazor-ui-builder -t <target>
    #   apm install syncfusion/maui-ui-builder -t <target>
    #   apm install syncfusion/wpf-ui-builder -t <target>
    #   apm install syncfusion/winforms-ui-builder -t <target>
    #   apm install syncfusion/winui-ui-builder -t <target>
