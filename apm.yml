name: software-dev-workflow
version: 2.0.0
description: >
  Lightweight development workflow that uses OpenSpec as the orchestrator.
  Layers engineering discipline (TDD, code review, incremental delivery)
  on top of OpenSpec's lifecycle. Routes UI work to Syncfusion UI Builders.
  Use when building features, fixing bugs, or starting a new project.
author: Syncfusion Inc
targets:
  - copilot
  - claude
  - cursor
  - codex
  - gemini
  - windsurf
  - kiro
  - opencode

# No apm dependencies — this package is self-contained.
# OpenSpec: install separately via npm install -g @fission-ai/openspec@latest
# Syncfusion UI Builders: install ONE per project, see README.md
